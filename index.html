<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masagochi v3.0 Bio</title>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, Label } = window.Recharts;

        // Inline Icons
        const RefreshCw = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Trash2 = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const BookOpen = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const ChevronRight = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"/></svg>;
        const TrendingUp = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const AlertCircle = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

        const Masagochi = () => {
    // Estado de parámetros
    const [temperature, setTemperature] = useState(26);
    const [hydration, setHydration] = useState(70);
    const [flourType, setFlourType] = useState('integral');
    const [origin, setOrigin] = useState('organica');
    const [time, setTime] = useState(12);
    const [inoculationRatio, setInoculationRatio] = useState('1:3');
    const [altitude, setAltitude] = useState(0);

    // Estado de la simulación
    const [yeastPop, setYeastPop] = useState(null);
    const [labPop, setLabPop] = useState(null);
    const [cycleNumber, setCycleNumber] = useState(1);
    const [simulationData, setSimulationData] = useState([]);
    const [finalState, setFinalState] = useState(null);
    const [peakTime, setPeakTime] = useState(null);
    const [history, setHistory] = useState([]);
    const [selectedHistoryIndex, setSelectedHistoryIndex] = useState(null);
    const [showHistory, setShowHistory] = useState(false);

    // Constantes del modelo
    const flourParams = {
        blanca: { buffer: 0.8, nutrients: 1.0, labBonus: 1.0, name: 'Blanca', glutenStrength: 1.0 },
        integral: { buffer: 1.5, nutrients: 1.4, labBonus: 1.2, name: 'Integral', glutenStrength: 0.8 },
        centeno: { buffer: 1.8, nutrients: 1.6, labBonus: 1.4, name: 'Centeno', glutenStrength: 0.4 }
    };

    const ratioToInitial = {
        '1:1': 0.50,
        '1:2': 0.33,
        '1:3': 0.25,
        '1:4': 0.20,
        '1:5': 0.16,
        '1:10': 0.09
    };

    const originBonus = origin === 'organica' ? 1.15 : 1.0;

    // Calcular N0 basado en ratio de inoculación (porcentaje real de la masa)
    // Asumimos que la capacidad máxima poblacional es 100% (100).
    const getInitialPopulation = (ratio) => {
        const baseInitial = ratioToInitial[ratio];
        // Si no hay población previa guardada, asumimos una masa madre madura "estándar"
        const matureYeast = yeastPop !== null ? yeastPop : 100;
        const matureLab = labPop !== null ? labPop : 100;
        
        return {
            yeast: matureYeast * baseInitial,
            lab: matureLab * baseInitial,
            acid: 0 // El ácido se diluye
        };
    };

    // Tasa de crecimiento base para levaduras (Saccharomyces)
    const getYeastGrowthRate = (temp) => {
        if (temp < 4) return 0;
        if (temp > 40) return 0;
        const optTemp = 27;
        const maxRate = 0.45; // Duplicación cada ~1.5h
        return maxRate * Math.exp(-0.5 * Math.pow((temp - optTemp) / 6, 2));
    };

    // Tasa de crecimiento para bacterias (LAB)
    const getLABGrowthRate = (temp) => {
        if (temp < 8) return 0;
        if (temp > 45) return 0;
        const optTemp = 33;
        const maxRate = 0.60;
        return maxRate * Math.exp(-0.5 * Math.pow((temp - optTemp) / 7, 2));
    };

    // Efecto de altitud en expansión de gas
    const getAltitudeExpansionFactor = (alt) => {
        return 1 + (alt / 4000) * 0.3; // Relación lineal
    };

    // Simular fermentación usando integración de Euler (ODE)
    const runSimulation = () => {
        const flourP = flourParams[flourType];
        const steps = 400; // Mayor resolución temporal
        const dt = time / steps;

        const initial = getInitialPopulation(inoculationRatio);
        let y = initial.yeast; // Levaduras
        let l = initial.lab;   // Bacterias LAB
        let food = 100 * flourP.nutrients; // Nutrientes en % base
        let acid = flourP.buffer * 5; // Ácido base inicial (simula masa recién mezclada pH~5.8)
        let gas = 0; // Gas retenido (volumen que vemos subir)
        
        const data = [];

        // Factores ambientales
        const hydrationFactor = hydration / 100;
        const rYeastBase = getYeastGrowthRate(temperature) * originBonus;
        const rLABBase = getLABGrowthRate(temperature) * originBonus * flourP.labBonus;
        const K = 100; // Capacidad de carga 100%
        const altitudeFactor = getAltitudeExpansionFactor(altitude);

        let maxVolume = 0;
        let peakTimeFound = 0;
        let peakReached = false;

        for (let i = 0; i <= steps; i++) {
            const currentTime = (i / steps) * time;
            
            // 1. Calcular pH actual (A mayor acidez acumulada, el pH cae logarítmicamente)
            const currentPH = Math.max(3.3, 6.0 - Math.log10(1 + acid / flourP.buffer));

            // 2. Inhibición
            const foodFactor = Math.max(0, food / (100 * flourP.nutrients));
            const pHInhibitionYeast = currentPH < 3.8 ? Math.max(0, (currentPH - 3.4) / 0.4) : 1;
            const pHInhibitionLAB = currentPH < 3.5 ? Math.max(0, (currentPH - 3.2) / 0.3) : 1;
            
            // Movilidad afectada por hidratación
            const mobility = Math.pow(hydrationFactor, 1.2);

            // Tasas efectivas
            const rY = rYeastBase * foodFactor * pHInhibitionYeast * mobility;
            const rL = rLABBase * foodFactor * pHInhibitionLAB * mobility;

            // 3. Ecuaciones diferenciales (Crecimiento logístico con fase estacionaria natural)
            const dy = rY * y * (1 - y / K);
            const dl = rL * l * (1 - l / K);
            
            // 4. Consumo de sustrato
            const dFood = -(dy * 0.5 + dl * 0.3) - (y * 0.05 + l * 0.05);

            // 5. Producción de ácido metabólico
            const dAcid = (dl * 0.8 + l * 0.1) + (dy * 0.1 + y * 0.02);

            // 6. Producción y retención de gas (Volumen)
            const gasProd = (dy * 1.5 + y * 0.2) * altitudeFactor * (foodFactor > 0.1 ? 1 : 0.2);
            
            // Degradación del gluten (activa proteasas por acidez extrema + alta hidratación)
            const glutenDegradation = (currentPH < 4.1 ? (4.1 - currentPH) * 2 : 0) * (2 / flourP.glutenStrength) * (hydrationFactor);
            
            const gasEscapeRate = Math.max(0, gas * glutenDegradation * 0.08);
            
            const dGas = gasProd - gasEscapeRate;

            // Integración de Euler
            y = Math.max(1, y + dy * dt); // Mínimo biológico 1 para no extinguirse
            l = Math.max(1, l + dl * dt);
            food = Math.max(0, food + dFood * dt);
            acid = acid + dAcid * dt;
            gas = Math.max(0, gas + dGas * dt);

            // Volumen visual (100 base + expansión por gas)
            const initialVolume = 100; 
            const visualVolume = initialVolume + gas;

            // Detectar pico de volumen
            if (visualVolume > maxVolume) {
                maxVolume = visualVolume;
                peakTimeFound = currentTime;
                peakReached = false;
            } else if (!peakReached && maxVolume > initialVolume * 1.2 && visualVolume < maxVolume * 0.98) {
                peakReached = true;
            }

            data.push({
                time: parseFloat(currentTime.toFixed(2)),
                levaduras: parseFloat(y.toFixed(2)),
                lab: parseFloat(l.toFixed(2)),
                pH: parseFloat(currentPH.toFixed(2)),
                actividad: parseFloat((visualVolume * 0.5).toFixed(2)) 
            });
        }

        setSimulationData(data);
        setPeakTime(peakTimeFound);

        const finalData = data[data.length - 1];
        setFinalState({
            yeast: finalData.levaduras,
            lab: finalData.lab,
            pH: finalData.pH,
            activity: finalData.actividad,
            ratio: (finalData.levaduras / (finalData.lab + 0.1)).toFixed(2),
            peakTime: peakTimeFound
        });
    };

    // Ejecutar simulación cuando cambien los parámetros
    useEffect(() => {
        runSimulation();
    }, [temperature, hydration, flourType, origin, time, inoculationRatio, altitude, yeastPop, labPop]);

    // Función para generar nuevo experimento y guardar en historial
    const generateExperiment = () => {
        const experiment = {
            id: Date.now(),
            cycle: cycleNumber,
            temperature,
            hydration,
            flourType,
            origin,
            time,
            inoculationRatio,
            altitude,
            finalState: { ...finalState },
            data: [...simulationData],
            peakTime,
            timestamp: new Date().toLocaleString()
        };

        setHistory([experiment, ...history]);
        setCycleNumber(cycleNumber + 1);
    };

    // Función para alimentar/refrescar
    const feedCycle = () => {
        if (finalState) {
            generateExperiment();
            const dilution = ratioToInitial[inoculationRatio];
            setYeastPop(finalState.yeast * dilution);
            setLabPop(finalState.lab * dilution);
        }
    };

    // Función para resetear todo
    const resetMasagochi = () => {
        setYeastPop(null);
        setLabPop(null);
        setCycleNumber(1);
        setHistory([]);
        setSelectedHistoryIndex(null);
        setTemperature(26);
        setHydration(70);
        setFlourType('integral');
        setOrigin('organica');
        setTime(12);
        setInoculationRatio('1:3');
        setAltitude(0);
    };

    // Función para cargar experimento del historial
    const loadHistoryExperiment = (index) => {
        const exp = history[index];
        setSelectedHistoryIndex(index);
        setSimulationData(exp.data);
        setFinalState(exp.finalState);
        setPeakTime(exp.peakTime);
        setTemperature(exp.temperature);
        setHydration(exp.hydration);
        setFlourType(exp.flourType);
        setOrigin(exp.origin);
        setTime(exp.time);
        setInoculationRatio(exp.inoculationRatio);
        setAltitude(exp.altitude);
    };

    // Determinar estado del Masagochi basado en el ÚLTIMO punto del tiempo seleccionado
    const getMasagochiState = () => {
        if (!finalState || !simulationData.length) return 'neutral';

        const currentData = simulationData[simulationData.length - 1];
        const { pH, levaduras, lab } = currentData;
        const activity = levaduras + lab;

        // Determinar en qué fase estamos según el tiempo actual
        const timeSincePeak = peakTime ? time - peakTime : 0;

        if (temperature > 35 || pH < 3.4) return 'dead';

        // Si estamos antes del pico (crecimiento activo)
        if (peakTime && time <= peakTime + 0.5) {
            if (time < 2) return 'sleepy';
            return 'young';
        }

        // Si estamos en la meseta (justo después del pico)
        if (peakTime && timeSincePeak > 0 && timeSincePeak <= 2) {
            if (pH >= 4.1 && pH <= 4.5 && activity > 80) return 'happy';
            return 'neutral';
        }

        // Si estamos en colapso
        if (peakTime && timeSincePeak > 2) {
            if (pH < 3.8 || activity < levaduras * 0.6) return 'sour';
            return 'old';
        }

        // Estados generales
        if (activity < 20 || temperature < 15) return 'sleepy';
        if (pH >= 4.1 && pH <= 4.5 && activity > 80) return 'happy';
        if (pH < 3.8) return 'sour';

        return 'neutral';
    };

    // Obtener mensaje de feedback basado en pico y tiempo actual
    const getPeakFeedback = () => {
        if (!peakTime) return null;

        const hours = Math.floor(peakTime);
        const minutes = Math.round((peakTime - hours) * 60);
        const timeSincePeak = time - peakTime;

        // Mensajes según fase temporal
        if (time < peakTime - 0.5) {
            return {
                icon: <TrendingUp className="w-5 h-5" />,
        color: 'text-blue-600 bg-blue-50',
                message: `Fase de crecimiento - Pico estimado en ${hours}h ${minutes}m`
            };
        }

        if (time >= peakTime - 0.5 && time <= peakTime + 0.5) {
            if (peakTime < 4) {
                return {
                    icon: <TrendingUp className="w-5 h-5" />,
          color: 'text-orange-600 bg-orange-50',
                    message: `¡PICO ALCANZADO! Masa Madre muy activa (Young Levain) - ${hours}h ${minutes}m`
                };
            } else if (peakTime > 10) {
                return {
                    icon: <AlertCircle className="w-5 h-5" />,
          color: 'text-blue-600 bg-blue-50',
                    message: `Pico alcanzado - Fermentación lenta (Old levain) - ${hours}h ${minutes}m`
                };
            } else {
                return {
                    icon: <TrendingUp className="w-5 h-5" />,
          color: 'text-green-600 bg-green-50',
                    message: `¡PICO ÓPTIMO! - ${hours}h ${minutes}m`
                };
            }
        }

        if (timeSincePeak > 0.5 && timeSincePeak <= 2) {
            return {
                icon: <TrendingUp className="w-5 h-5" />,
        color: 'text-green-600 bg-green-50',
                message: `Meseta post-pico (momento ideal para hornear) - Pico fue a las ${hours}h ${minutes}m`
            };
        }

        if (timeSincePeak > 2) {
            return {
                icon: <AlertCircle className="w-5 h-5" />,
        color: 'text-red-600 bg-red-50',
                message: `Fase de colapso - Sobrefermentada (${Math.floor(timeSincePeak)}h desde pico)`
            };
        }

        return null;
    };

    // Avatar del Masagochi
    const MasagochiAvatar = ({ state }) => {
        const expressions = {
            happy: { face: '😊', color: 'bg-amber-300', text: '¡Feliz y activo!' },
            neutral: { face: '😐', color: 'bg-amber-200', text: 'Estado normal' },
            sleepy: { face: '😴', color: 'bg-gray-300', text: 'Fase Lag' },
            sour: { face: '😖', color: 'bg-yellow-400', text: 'Muy ácido' },
            dead: { face: '💀', color: 'bg-red-300', text: 'Muerto' },
            young: { face: '🚀', color: 'bg-orange-300', text: 'Muy joven/activo' },
            old: { face: '🐌', color: 'bg-blue-300', text: 'Sobrefermentado' }
        };

        const expr = expressions[state];

        return (
            <div className= {`${expr.color} rounded-full w-28 h-28 flex flex-col items-center justify-center shadow-lg transition-all duration-500`
    }>
        <div className="text-5xl" > { expr.face } </div>
            < div className = "text-xs font-bold mt-1 text-gray-700 text-center px-2" > { expr.text } </div>
                </div>
    );
  };

const masagochiState = getMasagochiState();
const peakFeedback = getPeakFeedback();

return (
    <div className= "min-h-screen bg-gradient-to-br from-amber-50 to-orange-100 p-4" >
    <div className="max-w-7xl mx-auto" >
        {/* Header */ }
        < div className = "text-center mb-6" >
            <h1 className="text-4xl font-bold text-amber-900 mb-2" >🍞 Masagochi v2.0 🍞</h1>
                < p className = "text-amber-700" > Simulador Científico Avanzado de Masa Madre </p>
                    < p className = "text-sm text-amber-600" > Ciclo #{ cycleNumber } </p>
                        </div>

                        < div className = "flex gap-4" >
                            {/* Sidebar - Bitácora */ }
                            < div className = {`${showHistory ? 'w-72' : 'w-12'} transition-all duration-300 bg-white rounded-lg shadow-lg p-3`}>
                                <button
              onClick={ () => setShowHistory(!showHistory) }
className = "flex items-center gap-2 w-full text-amber-800 hover:text-amber-600 font-semibold mb-3"
    >
    <BookOpen className="w-5 h-5" />
        { showHistory && <span>Bitácora de Masas </span>}
</button>

{
    showHistory && (
        <div className="space-y-2 max-h-96 overflow-y-auto" >
            {
                history.length === 0 ? (
                    <p className= "text-sm text-gray-500 italic" > Sin experimentos guardados</ p >
                ) : (
        history.map((exp, idx) => (
            <button
                      key= { exp.id }
                      onClick = {() => loadHistoryExperiment(idx)}
className = {`w-full text-left p-3 rounded-lg text-sm transition-colors ${selectedHistoryIndex === idx
        ? 'bg-amber-100 border-2 border-amber-400'
        : 'bg-gray-50 hover:bg-amber-50 border border-gray-200'
    }`}
                    >
    <div className="font-semibold text-amber-800" > Ciclo #{ exp.cycle } </div>
        < div className = "text-xs text-gray-600" >
            { flourParams[exp.flourType].name } - { exp.inoculationRatio }
            </div>
            < div className = "text-xs text-gray-500" > { exp.timestamp } </div>
                </button>
                  ))
                )}
</div>
            )}
</div>

{/* Main Content */ }
<div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-4" >
    {/* Panel de Control */ }
    < div className = "bg-white rounded-lg shadow-lg p-5 space-y-4 h-fit" >
        <div className="flex justify-between items-center mb-3" >
            <h2 className="text-xl font-bold text-amber-800" > Control </h2>
                < button
onClick = { resetMasagochi }
className = "flex items-center gap-1 text-red-600 hover:text-red-700 text-sm"
title = "Reiniciar Masagochi"
    >
    <Trash2 className="w-4 h-4" />
        </button>
        </div>

{/* Ratio de Inoculación */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-2" >
        Ratio de Refresco: { inoculationRatio }
</label>
    < select
value = { inoculationRatio }
onChange = {(e) => setInoculationRatio(e.target.value)}
className = "w-full p-2 border border-amber-300 rounded-lg focus:ring-2 focus:ring-amber-500"
    >
    <option value="1:1" > 1: 1(Muy activo, pico rápido) </option>
        < option value = "1:2" > 1: 2 </option>
            < option value = "1:3" > 1: 3(Equilibrado) </option>
                < option value = "1:4" > 1: 4 </option>
                    < option value = "1:5" > 1: 5 </option>
                        < option value = "1:10" > 1: 10(Lento, pico tardío) </option>
                            </select>
                            </div>

{/* Temperatura */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Temperatura: { temperature }°C
            </label>
            < input
type = "range"
min = "15"
max = "35"
value = { temperature }
onChange = {(e) => setTemperature(Number(e.target.value))}
className = "w-full h-2 bg-amber-200 rounded-lg appearance-none cursor-pointer"
    />
    </div>

{/* Hidratación */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Hidratación: { hydration }%
            </label>
            < input
type = "range"
min = "50"
max = "120"
value = { hydration }
onChange = {(e) => setHydration(Number(e.target.value))}
className = "w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer"
    />
    </div>

{/* Altitud */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Altitud: { altitude }m s.n.m.
                </label>
            < input
type = "range"
min = "0"
max = "4000"
step = "100"
value = { altitude }
onChange = {(e) => setAltitude(Number(e.target.value))}
className = "w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer"
    />
    </div>

{/* Tipo de Harina */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Tipo de Harina
            </label>
            < select
value = { flourType }
onChange = {(e) => setFlourType(e.target.value)}
className = "w-full p-2 border border-amber-300 rounded-lg focus:ring-2 focus:ring-amber-500"
    >
    <option value="blanca" > Blanca </option>
        < option value = "integral" > Integral </option>
            < option value = "centeno" > Centeno </option>
                </select>
                </div>

{/* Origen */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Origen
        </label>
        < select
value = { origin }
onChange = {(e) => setOrigin(e.target.value)}
className = "w-full p-2 border border-amber-300 rounded-lg focus:ring-2 focus:ring-amber-500"
    >
    <option value="convencional" > Convencional </option>
        < option value = "organica" > Orgánica(+15 % actividad) </option>
            </select>
            </div>

{/* Tiempo */ }
<div>
    <label className="block text-sm font-semibold text-gray-700 mb-1" >
        Tiempo de Observación: { time } h
            </label>
            < input
type = "range"
min = "3"
max = "48"
value = { time }
onChange = {(e) => setTime(Number(e.target.value))}
className = "w-full h-2 bg-green-200 rounded-lg appearance-none cursor-pointer"
    />
    <div className="flex justify-between text-xs text-gray-500 mt-1" >
        <span>3h(pico) </span>
            < span > 48h(ciclo completo) </span>
                </div>
                </div>

{/* Botones de Acción */ }
<div className="space-y-2 pt-2" >
    <button
                  onClick={ feedCycle }
className = "w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2"
    >
    <RefreshCw className="w-4 h-4" />
        Alimentar / Refrescar
        </button>
        < button
onClick = { generateExperiment }
className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition-colors shadow-md flex items-center justify-center gap-2"
    >
    <ChevronRight className="w-4 h-4" />
        Guardar Experimento
            </button>
            </div>
            </div>

{/* Visualización Principal */ }
<div className="lg:col-span-2 space-y-4" >
    {/* Avatar y Estado */ }
    < div className = "bg-white rounded-lg shadow-lg p-5" >
        <div className="flex items-center justify-between gap-4" >
            <MasagochiAvatar state={ masagochiState } />

{
    finalState && (
        <div className="flex-1 grid grid-cols-2 gap-3" >
            <div className="bg-amber-50 p-3 rounded-lg" >
                <div className="text-xs text-gray-600" > pH Actual </div>
                    < div className = "text-2xl font-bold text-amber-800" > { finalState.pH } </div>
                        </div>
                        < div className = "bg-amber-50 p-3 rounded-lg" >
                            <div className="text-xs text-gray-600" > Ratio L / LAB </div>
                                < div className = "text-2xl font-bold text-amber-800" > { finalState.ratio } </div>
                                    </div>
                                    < div className = "bg-orange-50 p-3 rounded-lg" >
                                        <div className="text-xs text-gray-600" > Levaduras </div>
                                            < div className = "text-xl font-bold text-orange-700" > { finalState.yeast.toFixed(1) } </div>
                                                </div>
                                                < div className = "bg-green-50 p-3 rounded-lg" >
                                                    <div className="text-xs text-gray-600" > LAB </div>
                                                        < div className = "text-xl font-bold text-green-700" > { finalState.lab.toFixed(1) } </div>
                                                            </div>
                                                            </div>
                  )
}
</div>
    </div>

{/* Feedback de Pico */ }
{
    peakFeedback && (
        <div className={ `${peakFeedback.color} rounded-lg p-4 flex items-center gap-3` }>
            { peakFeedback.icon }
            < span className = "font-semibold" > { peakFeedback.message } </span>
                </div>
              )
}

{/* Gráfico */ }
<div className="bg-white rounded-lg shadow-lg p-5" >
    <h3 className="text-lg font-bold text-amber-800 mb-3" > Evolución de la Fermentación </h3>
        < ResponsiveContainer width = "100%" height = { 350} >
            <LineChart data={ simulationData }>
                <CartesianGrid strokeDasharray="3 3" />
                    <XAxis 
                      dataKey="time"
label = {{ value: 'Tiempo (horas)', position: 'insideBottom', offset: -5 }}
                    />
    < YAxis
yAxisId = "left"
label = {{ value: 'Población / Volumen', angle: -90, position: 'insideLeft' }}
                    />
    < YAxis
yAxisId = "right"
orientation = "right"
domain = { [3, 6.5]}
label = {{ value: 'pH', angle: 90, position: 'insideRight' }}
                    />
    < Tooltip />
    <Legend />

{/* Línea de pico */ }
{
    peakTime && (
        <ReferenceLine 
                        x={ peakTime.toFixed(2) }
    stroke = "#ef4444"
    strokeDasharray = "5 5"
    yAxisId = "left"
        >
        <Label 
                          value={ `Pico: ${Math.floor(peakTime)}h ${Math.round((peakTime - Math.floor(peakTime)) * 60)}m` }
    position = "top"
    fill = "#ef4444"
    fontWeight = "bold"
        />
        </ReferenceLine>
                    )
}

<Line 
                      yAxisId="left"
type = "monotone"
dataKey = "actividad"
stroke = "#dc2626"
strokeWidth = { 3}
name = "Actividad Total"
dot = { false}
    />
    <Line 
                      yAxisId="left"
type = "monotone"
dataKey = "levaduras"
stroke = "#f97316"
strokeWidth = { 2}
name = "Levaduras"
dot = { false}
    />
    <Line 
                      yAxisId="left"
type = "monotone"
dataKey = "lab"
stroke = "#22c55e"
strokeWidth = { 2}
name = "LAB"
dot = { false}
    />
    <Line 
                      yAxisId="right"
type = "monotone"
dataKey = "pH"
stroke = "#3b82f6"
strokeWidth = { 2}
name = "pH"
dot = { false}
    />
    </LineChart>
    </ResponsiveContainer>
    </div>

{/* Info científica */ }
<div className="bg-amber-50 rounded-lg p-4 text-sm text-amber-900" >
    <h4 className="font-bold mb-2" >💡 Modelo Mejorado v2.0: </h4>
        < ul className = "space-y-1 list-disc list-inside" >
            <li><strong>Fase Lag: </strong> 0-2h (aparentemente quieta)</li >
                <li><strong>Ratio 1: 1 < /strong> a 26°C, 70% hidratación → Pico en ~3h</li >
                    <li><strong>Ratio 1: 5 < /strong> → Pico en ~5h</li >
                        <li><strong>Meseta: </strong> 2h después del pico (ideal para hornear)</li >
                            <li><strong>Colapso: </strong> Visible después de 24h completas</li >
                                <li>Menor hidratación = crecimiento más lento pero más denso </li>
                                    </ul>
                                    </div>
                                    </div>
                                    </div>
                                    </div>
                                    </div>
                                    </div>
  );
};



        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Masagochi />);
    </script>
</body>
</html>
